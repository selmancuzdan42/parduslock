<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lisans Yönetimi – Giriş</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #1a1a2e, #16213e, #0f3460);
            font-family: 'Segoe UI', Arial, sans-serif;
        }

        .card {
            background: rgba(255,255,255,0.96);
            border-radius: 16px;
            padding: 40px 36px;
            width: 100%;
            max-width: 380px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.4);
        }

        .logo-area {
            text-align: center;
            margin-bottom: 28px;
        }

        .badge {
            display: inline-block;
            background: #1a1a2e;
            color: #e2b96f;
            font-size: 0.7rem;
            font-weight: 700;
            letter-spacing: 2px;
            padding: 4px 12px;
            border-radius: 20px;
            text-transform: uppercase;
            margin-bottom: 12px;
        }

        .logo-area h1 {
            font-size: 1.2rem;
            color: #1a1a2e;
            font-weight: 700;
        }

        .logo-area p {
            font-size: 0.8rem;
            color: #999;
            margin-top: 4px;
        }

        label {
            display: block;
            font-size: 0.8rem;
            font-weight: 600;
            color: #555;
            margin-bottom: 6px;
            margin-top: 18px;
        }

        input[type="text"],
        input[type="password"] {
            width: 100%;
            padding: 11px 14px;
            border: 1.5px solid #ddd;
            border-radius: 8px;
            font-size: 0.95rem;
            color: #1a1a2e;
            outline: none;
            transition: border-color 0.2s;
        }

        input:focus { border-color: #0f3460; }

        .error-box {
            background: #fdecea;
            border: 1px solid #f5c6cb;
            color: #c0392b;
            border-radius: 8px;
            padding: 10px 14px;
            font-size: 0.88rem;
            margin-top: 18px;
        }

        button[type="submit"] {
            width: 100%;
            margin-top: 26px;
            padding: 13px;
            background: linear-gradient(135deg, #1a1a2e, #0f3460);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: opacity 0.2s;
        }

        button[type="submit"]:hover { opacity: 0.85; }

        .footer {
            text-align: center;
            font-size: 0.72rem;
            color: #bbb;
            margin-top: 24px;
        }
    </style>
</head>
<body>
    <div class="card">
        <div class="logo-area">
            <div class="badge">Süper Admin</div>
            <h1>Lisans Yönetim Paneli</h1>
            <p>Yetkisiz erişim yasaktır</p>
        </div>

        <form method="POST" action="/sa/login">
            <label for="username">Kullanıcı Adı</label>
            <input type="text" id="username" name="username"
                   placeholder="sadmin" autocomplete="username" required>

            <label for="password">Şifre</label>
            <input type="password" id="password" name="password"
                   placeholder="••••••••" autocomplete="current-password" required>

            {% if error %}
            <div class="error-box">{{ error }}</div>
            {% endif %}

            <button type="submit">Giriş Yap</button>
        </form>

        <div class="footer">Pardus Akıllı Tahta &copy; 2026</div>
    </div>
</body>
</html>

server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Gzip sıkıştırma
    gzip on;
    gzip_types text/plain text/css application/javascript text/html;
    gzip_min_length 1024;

    # Cache static assets
    location ~* \.(css|js|png|jpg|jpeg|gif|ico|svg|woff2?)$ {
        expires 30d;
        add_header Cache-Control "public, no-transform";
    }

    # İndirme dosyaları
    location /downloads/ {
        alias /usr/share/nginx/html/downloads/;
        add_header Content-Disposition "attachment";
        gzip off;
    }

    # Flask API — versiyon
    location /api/version {
        proxy_pass http://host.docker.internal:5000/api/version;
        proxy_set_header Host $host;
        add_header Cache-Control "no-cache";
    }

    # Flask API — iletişim formu
    location /api/contact {
        proxy_pass http://host.docker.internal:5000/api/contact;
        proxy_set_header Host $host;
    }

    # SPA fallback (gerekirse)
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Güvenlik başlıkları
    add_header X-Frame-Options "SAMEORIGIN";
    add_header X-Content-Type-Options "nosniff";
    add_header X-XSS-Protection "1; mode=block";
}

<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Pardus Lock</title>

  <!-- PWA -->
  <link rel="manifest" href="/manifest.json" />
  <meta name="theme-color" content="#1a7abf" />

  <!-- iOS PWA -->
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Pardus Lock" />
  <link rel="apple-touch-icon" href="/assets/img/favicon.png" />

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="/assets/img/favicon.png" />

<style>
/* ── RESET & VARS ── */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg:      #07111d;
  --bg2:     #0c1a28;
  --card:    #112236;
  --accent:  #1a7abf;
  --accent2: #0fa36e;
  --red:     #ef4444;
  --warn:    #f59e0b;
  --text:    #e2edf7;
  --text2:   #b0c4d8;
  --muted:   #637d96;
  --border:  rgba(255,255,255,0.08);
  --radius:  16px;
}
html, body {
  height: 100%;
  background: var(--bg);
  color: var(--text);
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
  -webkit-font-smoothing: antialiased;
  overflow: hidden;
}

/* ── SCREENS ── */
.screen {
  position: fixed; inset: 0;
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  padding: env(safe-area-inset-top, 20px) 24px env(safe-area-inset-bottom, 20px);
  opacity: 0; pointer-events: none; transition: opacity .25s;
}
.screen.active { opacity: 1; pointer-events: all; }

/* ── HEADER ── */
.app-header {
  position: fixed; top: 0; left: 0; right: 0;
  padding: env(safe-area-inset-top, 0) 20px 0;
  background: linear-gradient(var(--bg), transparent);
  z-index: 10;
  display: flex; align-items: center; justify-content: space-between;
  height: calc(56px + env(safe-area-inset-top, 0px));
}
.app-header.hidden { display: none; }
.logo {
  display: flex; align-items: center; gap: 10px;
  font-size: 1rem; font-weight: 700; color: var(--text);
}
.logo img { width: 30px; height: 30px; border-radius: 8px; }
.btn-logout {
  background: rgba(239,68,68,.12);
  border: 1px solid rgba(239,68,68,.2);
  color: #f87171;
  padding: 7px 14px; border-radius: 10px;
  font-size: .78rem; font-weight: 600;
  cursor: pointer; transition: background .2s;
}
.btn-logout:active { background: rgba(239,68,68,.25); }

/* ── LOGIN SCREEN ── */
#screen-login {
  background: var(--bg);
}
.login-box {
  width: 100%; max-width: 380px;
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 36px 28px;
  box-shadow: 0 24px 64px rgba(0,0,0,.5);
}
.login-logo {
  display: flex; align-items: center; gap: 12px;
  margin-bottom: 28px;
}
.login-logo img { width: 44px; height: 44px; border-radius: 12px; }
.login-logo h1 { font-size: 1.3rem; font-weight: 800; }
.login-logo p { font-size: .78rem; color: var(--muted); margin-top: 2px; }
.form-group { margin-bottom: 16px; }
.form-group label {
  display: block; font-size: .8rem; font-weight: 600;
  color: var(--text2); margin-bottom: 7px;
}
.form-group input {
  width: 100%; padding: 12px 14px;
  background: var(--bg2); border: 1px solid var(--border);
  border-radius: 10px; color: var(--text);
  font-size: .95rem; outline: none;
  transition: border-color .2s;
}
.form-group input:focus { border-color: var(--accent); }
.btn-primary {
  width: 100%; padding: 13px;
  background: var(--accent); color: #fff;
  border: none; border-radius: 12px;
  font-size: 1rem; font-weight: 700;
  cursor: pointer; transition: opacity .2s, transform .1s;
  margin-top: 8px;
}
.btn-primary:active { opacity: .85; transform: scale(.98); }
.btn-primary:disabled { opacity: .5; cursor: not-allowed; }
.error-msg {
  background: rgba(239,68,68,.1);
  border: 1px solid rgba(239,68,68,.25);
  color: #f87171;
  padding: 10px 14px; border-radius: 10px;
  font-size: .83rem; margin-top: 14px;
  display: none;
}
.error-msg.show { display: block; }

/* ── QR SCREEN ── */
#screen-qr {
  background: #000; padding: 0;
  flex-direction: column;
}
#screen-qr .qr-top {
  position: fixed; top: 0; left: 0; right: 0; z-index: 5;
  padding: calc(env(safe-area-inset-top, 0px) + 16px) 20px 16px;
  background: linear-gradient(rgba(0,0,0,.8), transparent);
  display: flex; align-items: center; justify-content: space-between;
}
#screen-qr .qr-top .logo { color: #fff; }
#screen-qr .qr-title {
  font-size: .85rem; color: rgba(255,255,255,.7);
  font-weight: 500;
}
#video-container {
  position: fixed; inset: 0;
  display: flex; align-items: center; justify-content: center;
  background: #000;
}
#qr-video {
  width: 100%; height: 100%;
  object-fit: cover;
}
#qr-overlay {
  position: fixed; inset: 0; pointer-events: none;
  display: flex; align-items: center; justify-content: center;
}
.qr-frame {
  width: min(260px, 65vw); height: min(260px, 65vw);
  position: relative;
}
.qr-frame::before, .qr-frame::after,
.qr-frame span::before, .qr-frame span::after {
  content: ""; position: absolute;
  width: 28px; height: 28px;
  border-color: #fff; border-style: solid;
}
.qr-frame::before  { top: 0; left: 0;    border-width: 3px 0 0 3px; border-radius: 4px 0 0 0; }
.qr-frame::after   { top: 0; right: 0;   border-width: 3px 3px 0 0; border-radius: 0 4px 0 0; }
.qr-frame span::before { bottom: 0; left: 0;  border-width: 0 0 3px 3px; border-radius: 0 0 0 4px; }
.qr-frame span::after  { bottom: 0; right: 0; border-width: 0 3px 3px 0; border-radius: 0 0 4px 0; }
.qr-frame .scan-line {
  position: absolute; left: 4px; right: 4px;
  height: 2px; background: var(--accent);
  box-shadow: 0 0 8px var(--accent);
  animation: scan 2s linear infinite;
}
@keyframes scan {
  0%   { top: 8px; }
  50%  { top: calc(100% - 10px); }
  100% { top: 8px; }
}
.qr-hint {
  position: fixed; bottom: calc(env(safe-area-inset-bottom, 0px) + 40px);
  left: 0; right: 0; text-align: center;
  color: rgba(255,255,255,.7); font-size: .85rem;
}
.btn-manual {
  display: block; margin: 8px auto 0;
  background: none; border: 1px solid rgba(255,255,255,.3);
  color: rgba(255,255,255,.8); padding: 8px 18px;
  border-radius: 10px; font-size: .82rem; cursor: pointer;
}

/* ── MANUAL ENTRY MODAL ── */
.modal-backdrop {
  position: fixed; inset: 0; background: rgba(0,0,0,.7);
  z-index: 50; display: flex; align-items: flex-end;
  opacity: 0; pointer-events: none; transition: opacity .2s;
}
.modal-backdrop.show { opacity: 1; pointer-events: all; }
.modal-sheet {
  width: 100%; background: var(--bg2);
  border-radius: 20px 20px 0 0;
  padding: 24px 24px calc(env(safe-area-inset-bottom, 0px) + 24px);
  transform: translateY(100%); transition: transform .25s;
}
.modal-backdrop.show .modal-sheet { transform: translateY(0); }
.modal-sheet h3 { margin-bottom: 16px; font-size: 1rem; }
.modal-sheet input {
  width: 100%; padding: 12px 14px;
  background: var(--card); border: 1px solid var(--border);
  border-radius: 10px; color: var(--text); font-size: 1rem; outline: none;
  text-transform: uppercase; letter-spacing: .05em;
}
.modal-sheet input:focus { border-color: var(--accent); }
.modal-actions { display: flex; gap: 10px; margin-top: 14px; }
.btn-secondary {
  flex: 1; padding: 12px;
  background: var(--card); border: 1px solid var(--border);
  color: var(--text2); border-radius: 12px;
  font-size: .9rem; font-weight: 600; cursor: pointer;
}
.btn-confirm {
  flex: 2; padding: 12px;
  background: var(--accent); color: #fff;
  border: none; border-radius: 12px;
  font-size: .9rem; font-weight: 700; cursor: pointer;
}

/* ── CONTROL SCREEN ── */
#screen-control {
  background: var(--bg);
  padding-top: calc(env(safe-area-inset-top, 0px) + 64px);
  padding-bottom: env(safe-area-inset-bottom, 20px);
  justify-content: flex-start;
  overflow-y: auto;
}
.control-inner {
  width: 100%; max-width: 400px;
  padding: 0 4px;
}
.board-info {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 18px 20px;
  margin-bottom: 20px;
  display: flex; align-items: center; justify-content: space-between;
}
.board-info .board-name { font-size: 1rem; font-weight: 700; }
.board-info .board-loc  { font-size: .78rem; color: var(--muted); margin-top: 2px; }
.status-dot {
  width: 10px; height: 10px; border-radius: 50%;
  flex-shrink: 0;
}
.status-dot.online  { background: var(--accent2); box-shadow: 0 0 8px var(--accent2); }
.status-dot.offline { background: var(--muted); }

.btn-scan-new {
  width: 100%; padding: 10px;
  background: rgba(26,122,191,.1);
  border: 1px solid rgba(26,122,191,.2);
  color: #6ab8f0; border-radius: 12px;
  font-size: .85rem; font-weight: 600;
  cursor: pointer; margin-bottom: 24px;
  display: flex; align-items: center; justify-content: center; gap: 8px;
}

.cmd-section { margin-bottom: 20px; }
.cmd-label {
  font-size: .72rem; font-weight: 700; letter-spacing: .1em;
  text-transform: uppercase; color: var(--muted);
  margin-bottom: 10px; display: block;
}
.cmd-grid {
  display: grid; grid-template-columns: 1fr 1fr;
  gap: 10px;
}
.cmd-btn {
  padding: 20px 12px;
  border: 1px solid var(--border);
  border-radius: var(--radius);
  background: var(--card);
  color: var(--text);
  font-size: .85rem; font-weight: 700;
  cursor: pointer; transition: background .15s, transform .1s;
  display: flex; flex-direction: column; align-items: center; gap: 8px;
  -webkit-tap-highlight-color: transparent;
}
.cmd-btn:active { transform: scale(.95); }
.cmd-btn .cmd-icon { font-size: 1.6rem; line-height: 1; }
.cmd-btn.lock   { border-color: rgba(239,68,68,.25);   background: rgba(239,68,68,.07); }
.cmd-btn.unlock { border-color: rgba(15,163,110,.25);  background: rgba(15,163,110,.07); }
.cmd-btn.next   { border-color: rgba(26,122,191,.25);  background: rgba(26,122,191,.07); }
.cmd-btn.prev   { border-color: rgba(26,122,191,.25);  background: rgba(26,122,191,.07); }
.cmd-btn.lock .cmd-icon   { color: #f87171; }
.cmd-btn.unlock .cmd-icon { color: #34d399; }
.cmd-btn.next .cmd-icon,
.cmd-btn.prev .cmd-icon   { color: #6ab8f0; }

.feedback {
  padding: 12px 16px; border-radius: 12px;
  font-size: .85rem; font-weight: 600;
  text-align: center; margin-top: 16px;
  display: none;
}
.feedback.show { display: block; }
.feedback.ok   { background: rgba(15,163,110,.12); border: 1px solid rgba(15,163,110,.25); color: #34d399; }
.feedback.err  { background: rgba(239,68,68,.12);  border: 1px solid rgba(239,68,68,.25);  color: #f87171; }

/* ── SPINNER ── */
.spinner {
  width: 20px; height: 20px;
  border: 2px solid rgba(255,255,255,.2);
  border-top-color: #fff;
  border-radius: 50%;
  animation: spin .7s linear infinite;
  display: inline-block;
}
@keyframes spin { to { transform: rotate(360deg); } }

/* ── TOAST ── */
#toast {
  position: fixed; bottom: calc(env(safe-area-inset-bottom, 0px) + 24px);
  left: 50%; transform: translateX(-50%) translateY(80px);
  background: #1e3a52; border: 1px solid rgba(26,122,191,.3);
  color: var(--text); padding: 10px 20px;
  border-radius: 20px; font-size: .85rem; font-weight: 600;
  white-space: nowrap; z-index: 100;
  transition: transform .25s;
  pointer-events: none;
}
#toast.show { transform: translateX(-50%) translateY(0); }
</style>
</head>
<body>

<!-- ── HEADER (login hariç tüm ekranlarda) ── -->
<header class="app-header hidden" id="app-header">
  <div class="logo">
    <img src="/assets/img/favicon.png" alt="Pardus Lock" />
    Pardus Lock
  </div>
  <button class="btn-logout" id="btn-logout">Çıkış</button>
</header>

<!-- ══════════════════════════════════════
     EKRAN 1 — GİRİŞ
══════════════════════════════════════ -->
<div class="screen active" id="screen-login">
  <div class="login-box">
    <div class="login-logo">
      <img src="/assets/img/favicon.png" alt="Pardus Lock" />
      <div>
        <h1>Pardus Lock</h1>
        <p>Öğretmen Paneli</p>
      </div>
    </div>

    <div class="form-group">
      <label for="inp-user">Kullanıcı Adı</label>

<!-- ══════════════════════════════════════
     EKRAN 2 — QR TARAMA
══════════════════════════════════════ -->
<div class="screen" id="screen-qr">
  <div class="qr-top">
    <div class="logo" style="color:#fff">
      <img src="/assets/img/favicon.png" alt="Pardus Lock" />
      Pardus Lock
    </div>
    <button class="btn-logout" id="btn-logout-qr">Çıkış</button>
  </div>

  <div id="video-container">
    <video id="qr-video" autoplay playsinline muted></video>
  </div>

  <div id="qr-overlay">
    <div class="qr-frame">
      <span></span>
      <div class="scan-line"></div>

  </div>

  <div class="qr-hint">
    Tahtadaki QR kodu çerçeve içine alın
    <button class="btn-manual" id="btn-manual">Manuel Giriş</button>

</div>

<!-- ── Manuel Board ID Modalı ── -->
<div class="modal-backdrop" id="modal-manual">
  <div class="modal-sheet">
    <h3>Tahta ID Girin</h3>
    <input type="text" id="inp-board-manual" placeholder="Örn: ETAP1"
           autocapitalize="characters" autocorrect="off" />
    <div class="modal-actions">
      <button class="btn-secondary" id="btn-modal-cancel">İptal</button>
      <button class="btn-confirm"   id="btn-modal-ok">Bağlan</button>
    </div>
  </div>
</div>

<!-- ══════════════════════════════════════
     EKRAN 3 — KONTROL
══════════════════════════════════════ -->
<div class="screen" id="screen-control">
  <div class="control-inner">

    <!-- Tahta bilgisi -->
    <div class="board-info">
      <div>
        <div class="board-name" id="board-name">—</div>
        <div class="board-loc"  id="board-loc"></div>
      </div>
      <div class="status-dot offline" id="board-status"></div>
    </div>

    <button class="btn-scan-new" id="btn-scan-new">
      <span>📷</span> Farklı Tahta Tara
    </button>

    <!-- Kilit kontrolleri -->
    <span class="cmd-label">Kilit</span>
    <div class="cmd-grid" style="margin-bottom:10px">
      <button class="cmd-btn lock"   data-cmd="lock">
        <span class="cmd-icon">🔒</span> Kilitle
      </button>
      <button class="cmd-btn unlock" data-cmd="unlock">
        <span class="cmd-icon">🔓</span> Kilidi Aç
      </button>

<!-- ── TOAST ── -->
<div id="toast"></div>

<script src="/assets/js/jsqr.js"></script>
<script>
// ════════════════════════════════════════════════════
//  DURUM
// ════════════════════════════════════════════════════
let currentBoardId = null;
let scanActive     = false;
let videoStream    = null;
let scanRaf        = null;

const canvas = document.createElement("canvas");
const ctx    = canvas.getContext("2d", { willReadFrequently: true });

// ════════════════════════════════════════════════════
//  EKRAN GEÇİŞİ
// ════════════════════════════════════════════════════
function showScreen(id) {
  document.querySelectorAll(".screen").forEach(s => s.classList.remove("active"));
  document.getElementById("screen-" + id).classList.add("active");

  const header = document.getElementById("app-header");
  header.classList.toggle("hidden", id === "login" || id === "qr");

  if (id === "qr") startCamera();
  else             stopCamera();
}

// ════════════════════════════════════════════════════
//  API
// ════════════════════════════════════════════════════
async function api(method, path, body) {
  const opts = { method, credentials: "include", headers: {} };
  if (body) { opts.headers["Content-Type"] = "application/json"; opts.body = JSON.stringify(body); }
  const res = await fetch(path, opts);
  const json = await res.json().catch(() => ({}));
  return { ok: res.ok, status: res.status, data: json };
}

// ════════════════════════════════════════════════════
//  GİRİŞ
// ════════════════════════════════════════════════════
document.getElementById("btn-login").addEventListener("click", doLogin);
document.getElementById("inp-pass").addEventListener("keydown", e => {
  if (e.key === "Enter") doLogin();
});
document.getElementById("inp-user").addEventListener("keydown", e => {
  if (e.key === "Enter") document.getElementById("inp-pass").focus();
});

async function doLogin() {
  const username = document.getElementById("inp-user").value.trim();
  const password = document.getElementById("inp-pass").value;
  const errEl    = document.getElementById("login-error");
  const btn      = document.getElementById("btn-login");

  errEl.classList.remove("show");
  if (!username || !password) {
    showError(errEl, "Kullanıcı adı ve şifre gerekli.");
    return;
  }

  btn.disabled = true;
  btn.innerHTML = '<span class="spinner"></span>';

  const { ok, data } = await api("POST", "/api/login", { username, password });

  btn.disabled = false;
  btn.textContent = "Giriş Yap";

  if (ok) {
    showScreen("qr");
  } else {
    showError(errEl, data.message || "Giriş başarısız.");
  }
}

function showError(el, msg) {
  el.textContent = msg;
  el.classList.add("show");
}

// ════════════════════════════════════════════════════
//  ÇIKIŞ
// ════════════════════════════════════════════════════
async function doLogout() {
  await api("POST", "/api/logout");
  currentBoardId = null;
  document.getElementById("inp-pass").value = "";
  document.getElementById("login-error").classList.remove("show");
  showScreen("login");
}
document.getElementById("btn-logout").addEventListener("click", doLogout);
document.getElementById("btn-logout-qr").addEventListener("click", doLogout);

// ════════════════════════════════════════════════════
//  QR TARAMA
// ════════════════════════════════════════════════════
async function startCamera() {
  stopCamera();
  scanActive = true;
  try {
    videoStream = await navigator.mediaDevices.getUserMedia({
      video: { facingMode: "environment" }
    });
    const video = document.getElementById("qr-video");
    video.srcObject = videoStream;
    await video.play();
    requestScan();
  } catch (err) {
    showToast("Kamera açılamadı: " + err.message);
  }
}

function stopCamera() {
  scanActive = false;
  if (scanRaf) { cancelAnimationFrame(scanRaf); scanRaf = null; }
  if (videoStream) {
    videoStream.getTracks().forEach(t => t.stop());
    videoStream = null;
  }
}

function requestScan() {
  if (!scanActive) return;
  scanRaf = requestAnimationFrame(scanFrame);
}

function scanFrame() {
  if (!scanActive) return;
  const video = document.getElementById("qr-video");
  if (video.readyState === video.HAVE_ENOUGH_DATA) {
    canvas.width  = video.videoWidth;
    canvas.height = video.videoHeight;
    ctx.drawImage(video, 0, 0);
    const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
    const code = jsQR(imageData.data, imageData.width, imageData.height, {
      inversionAttempts: "dontInvert"
    });
    if (code && code.data) {
      const boardId = parseBoardId(code.data);
      if (boardId) {
        onBoardScanned(boardId);
        return;
      }
    }
  }
  requestScan();
}

// Android uygulamasıyla aynı format desteği
function parseBoardId(raw) {
  const trimmed = raw.trim();
  if (!trimmed) return null;
  try {
    const url = new URL(trimmed);
    const param = url.searchParams.get("board_id");
    if (param && param.trim()) return param.trim();
  } catch (_) {}
  return trimmed;
}

async function onBoardScanned(boardId) {
  scanActive = false;
  showToast("Tahta bağlanıyor...");
  await loadBoard(boardId);
}

// ════════════════════════════════════════════════════
//  MANUEL GİRİŞ
// ════════════════════════════════════════════════════
document.getElementById("btn-manual").addEventListener("click", () => {
  document.getElementById("modal-manual").classList.add("show");
  setTimeout(() => document.getElementById("inp-board-manual").focus(), 300);
});
document.getElementById("btn-modal-cancel").addEventListener("click", closeModal);
document.getElementById("modal-manual").addEventListener("click", e => {
  if (e.target === document.getElementById("modal-manual")) closeModal();
});
document.getElementById("btn-modal-ok").addEventListener("click", () => {
  const val = document.getElementById("inp-board-manual").value.trim().toUpperCase();
  if (!val) return;
  closeModal();
  onBoardScanned(val);
});
document.getElementById("inp-board-manual").addEventListener("keydown", e => {
  if (e.key === "Enter") document.getElementById("btn-modal-ok").click();
});

function closeModal() {
  document.getElementById("modal-manual").classList.remove("show");
  document.getElementById("inp-board-manual").value = "";
}

// ════════════════════════════════════════════════════
//  TAHTA YÜKLEME
// ════════════════════════════════════════════════════
async function loadBoard(boardId) {
  const { ok, data } = await api("GET", "/api/my_boards");
  if (!ok) { showToast("Tahtalar yüklenemedi."); startCamera(); return; }

  const boards = data.boards || [];
  const board  = boards.find(b => b.board_id === boardId);

  if (!board) {
    showToast("Bu tahtaya erişim yetkiniz yok.");
    setTimeout(() => { scanActive = true; requestScan(); }, 1500);
    return;
  }

  currentBoardId = boardId;
  document.getElementById("board-name").textContent = board.name || boardId;
  document.getElementById("board-loc").textContent  = board.location || "";

  const dot = document.getElementById("board-status");
  dot.className = "status-dot " + (board.is_online ? "online" : "offline");
  dot.title     = board.is_online ? "Çevrimiçi" : "Çevrimdışı";

  document.getElementById("cmd-feedback").classList.remove("show");
  showScreen("control");
}

// ════════════════════════════════════════════════════
//  YENİ TAHTA TARA
// ════════════════════════════════════════════════════
document.getElementById("btn-scan-new").addEventListener("click", () => {
  currentBoardId = null;
  showScreen("qr");
});

// ════════════════════════════════════════════════════
//  KOMUT GÖNDERME
// ════════════════════════════════════════════════════
document.querySelectorAll(".cmd-btn").forEach(btn => {
  btn.addEventListener("click", () => sendCommand(btn.dataset.cmd));
});

async function sendCommand(command) {
  if (!currentBoardId) return;

  const feedback = document.getElementById("cmd-feedback");
  feedback.classList.remove("show", "ok", "err");

  // Butonları geçici devre dışı bırak
  document.querySelectorAll(".cmd-btn").forEach(b => b.disabled = true);

  const { ok, data } = await api("POST", "/api/send_command", {
    board_id: currentBoardId,
    command
  });

  document.querySelectorAll(".cmd-btn").forEach(b => b.disabled = false);

  const msg = data.message || (ok ? "Komut gönderildi." : "Hata oluştu.");
  feedback.textContent = ok ? "✓ " + msg : "✗ " + msg;
  feedback.className = "feedback show " + (ok ? "ok" : "err");
}

// ════════════════════════════════════════════════════
//  TOAST
// ════════════════════════════════════════════════════
let toastTimer = null;
function showToast(msg) {
  const el = document.getElementById("toast");
  el.textContent = msg;
  el.classList.add("show");
  if (toastTimer) clearTimeout(toastTimer);
  toastTimer = setTimeout(() => el.classList.remove("show"), 2500);
}

// ════════════════════════════════════════════════════
//  BAŞLANGIÇ — Oturum kontrolü
// ════════════════════════════════════════════════════
(async () => {
  const { ok } = await api("GET", "/api/me");
  if (ok) showScreen("qr");
  // else login ekranında kal
})();

// ════════════════════════════════════════════════════
//  SERVICE WORKER
// ════════════════════════════════════════════════════
if ("serviceWorker" in navigator) {
  navigator.serviceWorker.register("/sw.js");
}
</script>
